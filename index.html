<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarTracker Live</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; }
        .menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; gap: 10px; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: #007AFF; color: white; font-weight: bold; }
        .status { font-size: 12px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="menu">
        <div>
            <button onclick="toggleTracking()" id="btn">📡 Start Live Tracking</button>
            <div id="status" class="status">Offline</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const map = L.map('map').setView([0,0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let carMarker = L.marker([0,0]).addTo(map);

        // RECEIVE: Move marker when DB updates
        onValue(ref(db, 'cars/car1'), (snap) => {
            if(snap.exists()){
                const {lat, lng} = snap.val();
                carMarker.setLatLng([lat, lng]);
                map.setView([lat, lng], 16);
                document.getElementById('status').innerText = "Live: " + new Date().toLocaleTimeString();
            }
        });

        // SEND: Watch GPS and update DB
        let watchID = null;
        window.toggleTracking = () => {
            if(watchID) {
                navigator.geolocation.clearWatch(watchID);
                watchID = null;
                document.getElementById('btn').innerText = "📡 Start Live Tracking";
            } else {
                watchID = navigator.geolocation.watchPosition(pos => {
                    set(ref(db, 'cars/car1'), { lat: pos.coords.latitude, lng: pos.coords.longitude });
                }, err => console.error(err), { enableHighAccuracy: true });
                document.getElementById('btn').innerText = "🛑 Stop Tracking";
            }
        };
    </script>
</body>

</html>
