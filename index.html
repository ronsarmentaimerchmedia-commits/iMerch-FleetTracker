<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetLink</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    <link rel="apple-touch-icon" href="i-Merch Media Logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: rgba(255, 255, 255, 0.95); --text: #333; --border: #007AFF; --card-bg: #ffffff; --accent: #FF9500; --secondary-text: #8e8e93; --hazard-red: #FF3B30; }
        .dark-mode { --bg: rgba(28, 28, 30, 0.95); --text: #ffffff; --border: #0A84FF; --card-bg: #1c1c1e; }
        
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .logo-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: var(--bg); padding: 10px 25px; 
            border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; align-items: center; border: 1.5px solid var(--border);
        }
        .header-logo-img { height: 35px; }
        .logo-text { font-weight: 800; font-size: 18px; color: var(--text); }
        .logo-text span { color: #007AFF; }

        .side-controls { position: absolute; top: 20px; right: 20px; z-index: 1002; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: var(--bg); border: 1.5px solid var(--border); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: var(--text); }
        .control-btn.active { background: #007AFF; color: white; }

        .menu { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--bg); padding: 20px; border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; 
            width: 92%; max-width: 380px; border: 1px solid rgba(0,122,255,0.2); color: var(--text);
        }

        .stats-container {
            background: var(--card-bg); border-radius: 20px; padding: 15px; margin: 10px 0;
            border: 1px solid #e5e5ea; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .speed-display { text-align: center; flex: 1; border-right: 1px solid #eee; }
        .speed-val { font-size: 28px; font-weight: 800; color: #007AFF; display: block; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .main-btn { padding: 16px; border-radius: 18px; background: #007AFF; color: white; font-weight: bold; border: none; cursor: pointer; font-size: 16px; width: 100%; }
        .fuel-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .type-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ddd; background: #f2f2f7; color: #333; font-size: 12px; cursor: pointer; font-weight: bold; }
        .type-btn.active { background: var(--border); color: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; color: var(--text); max-height: 80vh; overflow-y: auto; }
        input[type="number"], input[type="date"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        #historyLog { max-height: 200px; overflow-y: auto; font-size: 12px; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-top: 10px; color: #333; }
        .report-summary { font-size: 13px; margin: 15px 0; border-collapse: collapse; width: 100%; }
        .report-summary td, .report-summary th { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body class="light-mode">
    <div class="logo-header">
        <img src="i-Merch Media Logo.png" class="header-logo-img">
        <div class="logo-text">Fleet<span>Link</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()">🌓</div>
        <div class="control-btn" onclick="openHistoryModal()">📅</div>
    </div>

    <div id="map"></div>
    
    <div class="menu">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:5px;">
            <img id="profilePic" src="Ron Sarmenta.jpg" style="width:50px; height:50px; border-radius:50%; border:2px solid #007AFF;">
            <div>
                <b id="displayDriver">Ron Sarmenta</b><br>
                <span style="font-size:11px; color:var(--secondary-text);">Last Seen: <span id="lastUpdateTime">--:--:--</span></span>
            </div>
        </div>

        <select id="driverPicker" onchange="updateDriverProfile()" style="margin: 10px 0; width:100%; padding:10px; border-radius:10px;">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
        </select>

        <div class="stats-container">
            <div class="speed-display">
                <span id="liveSpeed" class="speed-val">0</span>
                <span style="font-size:12px; color:#007AFF; font-weight:bold;">km/h</span>
            </div>
            <div style="flex:1; padding-left:15px; display:flex; flex-direction:column; gap:5px;">
                <div>🔋 <span id="statBatt">--</span>%</div>
                <div>⛽ <span id="statFuel">0.00</span> L</div>
            </div>
        </div>

        <div style="display:flex; gap:8px; margin-bottom: 12px;">
            <button id="typeCar" class="type-btn active" onclick="setVehicleType('car')">🚗 Auto</button>
            <button id="typeBike" class="type-btn" onclick="setVehicleType('bike')">🏍️ Motor</button>
        </div>

        <button onclick="toggleTracking()" id="trackBtn" class="main-btn">📡 Start Tracking</button>
        
        <div class="action-grid" style="margin-top:10px;">
            <button onclick="document.getElementById('fuelModal').style.display='flex'" class="fuel-btn">⛽ Fuel Entry</button>
            <button onclick="checkAdminPass()" class="fuel-btn" style="background:#5856D6;">📊 Fleet Report</button>
        </div>
    </div>

    <div id="fuelModal" class="modal">
        <div class="modal-content">
            <h3>⛽ Fuel Entry</h3>
            <input type="number" id="fuelLit" placeholder="Liters added">
            <input type="number" id="fuelPrice" placeholder="Total Cost (PHP)">
            <button class="main-btn" onclick="submitFuel()">Save Entry</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:10px; color:var(--text);">Cancel</button>
        </div>
    </div>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h3>📊 Fleet Performance</h3>
            <canvas id="fuelChart" style="width:100%; height:200px;"></canvas>
            <div id="reportTableContainer"></div>
            <button class="main-btn" onclick="exportToExcel()" style="background:#34C759; margin-top:10px;">📥 Export Excel (CSV)</button>
            <button onclick="closeModals()" class="main-btn" style="background:gray; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <h3>📅 View History</h3>
            <input type="date" id="historyDate">
            <button class="main-btn" onclick="loadHistory()">View Logs</button>
            <div id="historyLog">Select a date to view activity...</div>
            <button onclick="clearHistoryPrompt()" style="color:red; margin-top:10px; border:none; background:none; cursor:pointer;">Clear All Logs</button>
            <button onclick="closeModals()" class="main-btn" style="background:gray; margin-top:10px;">Close</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, push, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map', { zoomControl: false }).setView([14.5794, 121.0359], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let isTracking = false;
        let watchID = null;
        let vehicleType = 'car';
        let batteryLevel = "--";
        let fuelChartInstance = null;

        // Battery Monitor logic
        if ('getBattery' in navigator) {
            navigator.getBattery().then(batt => {
                const updateBatt = () => {
                    batteryLevel = Math.floor(batt.level * 100);
                    document.getElementById('statBatt').innerText = batteryLevel;
                };
                updateBatt();
                batt.onlevelchange = updateBatt;
            });
        }

        window.toggleTheme = () => document.body.classList.toggle('dark-mode');

        window.setVehicleType = (type) => {
            vehicleType = type;
            document.getElementById('typeCar').classList.toggle('active', type === 'car');
            document.getElementById('typeBike').classList.toggle('active', type === 'bike');
        };

        window.toggleTracking = () => {
            const btn = document.getElementById('trackBtn');
            const driver = document.getElementById('driverPicker').value;
            if (!isTracking) {
                isTracking = true;
                btn.innerText = "🛑 Stop Tracking"; btn.style.background = "#FF3B30";
                watchID = navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, speed } = pos.coords;
                    const time = new Date().toLocaleTimeString();
                    document.getElementById('liveSpeed').innerText = Math.round((speed || 0) * 3.6);
                    document.getElementById('lastUpdateTime').innerText = time;
                    update(ref(db, `cars/${driver}`), { lat: latitude, lng: longitude, speed: Math.round((speed || 0) * 3.6), battery: batteryLevel, type: vehicleType, lastSeen: time });
                    const dateKey = new Date().toISOString().split('T')[0];
                    push(ref(db, `history/${driver}/${dateKey}`), { lat: latitude, lng: longitude, time: time });
                });
            } else {
                isTracking = false; navigator.geolocation.clearWatch(watchID);
                btn.innerText = "📡 Start Tracking"; btn.style.background = "#007AFF";
            }
        };

        window.submitFuel = () => {
            const lit = document.getElementById('fuelLit').value;
            const price = document.getElementById('fuelPrice').value;
            const driver = document.getElementById('driverPicker').value;
            if(!lit || !price) return alert("Fill all fields");
            push(ref(db, `fuel_logs/${driver}`), { liters: parseFloat(lit), cost: parseFloat(price), date: new Date().toLocaleDateString() });
            alert("Fuel Log Saved!"); closeModals();
        };

        window.checkAdminPass = async () => {
            const pass = prompt("Enter Admin Password:");
            if(pass === "1234") {
                document.getElementById('reportModal').style.display = 'flex';
                generateFleetReport();
            } else { alert("Incorrect Password"); }
        };

        async function generateFleetReport() {
            const snapshot = await get(ref(db, `fuel_logs`));
            const data = snapshot.val() || {};
            const drivers = Object.keys(data);
            const totals = drivers.map(d => {
                const logs = Object.values(data[d]);
                return logs.reduce((acc, curr) => acc + curr.liters, 0);
            });

            // Update Chart
            const ctx = document.getElementById('fuelChart').getContext('2d');
            if (fuelChartInstance) fuelChartInstance.destroy();
            fuelChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: drivers.map(d => d.toUpperCase()),
                    datasets: [{ label: 'Total Liters Consumed', data: totals, backgroundColor: '#007AFF', borderRadius: 5 }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            // Build Summary Table
            let tableHTML = `<table class="report-summary"><tr><th>Driver</th><th>Total L</th><th>Total PHP</th></tr>`;
            drivers.forEach((d, i) => {
                const logs = Object.values(data[d]);
                const cost = logs.reduce((acc, curr) => acc + curr.cost, 0);
                tableHTML += `<tr><td>${d.toUpperCase()}</td><td>${totals[i].toFixed(2)}</td><td>₱${cost.toLocaleString()}</td></tr>`;
            });
            tableHTML += `</table>`;
            document.getElementById('reportTableContainer').innerHTML = tableHTML;
        }

        window.exportToExcel = async () => {
            const snapshot = await get(ref(db, `fuel_logs`));
            const data = snapshot.val();
            const rows = [["Driver", "Date", "Liters", "Cost (PHP)"]];
            
            for (let driver in data) {
                Object.values(data[driver]).forEach(log => {
                    rows.push([driver.toUpperCase(), log.date, log.liters, log.cost]);
                });
            }

            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Fuel_Report");
            XLSX.writeFile(wb, `iMerch_Fleet_Report_${new Date().toLocaleDateString()}.csv`);
        };

        window.loadHistory = async () => {
            const driver = document.getElementById('driverPicker').value;
            const date = document.getElementById('historyDate').value;
            if(!date) return alert("Pick a date");
            const snapshot = await get(ref(db, `history/${driver}/${date}`));
            const logDiv = document.getElementById('historyLog'); logDiv.innerHTML = "";
            if(snapshot.exists()){
                Object.values(snapshot.val()).forEach(entry => {
                    logDiv.innerHTML += `<div>[${entry.time}] Lat: ${entry.lat.toFixed(4)} Lng: ${entry.lng.toFixed(4)}</div>`;
                });
            } else { logDiv.innerText = "No logs found."; }
        };

        window.clearHistoryPrompt = () => {
            if(prompt("Admin Password to CLEAR ALL:") === "1234") {
                set(ref(db, `history`), null); alert("Cleared."); location.reload();
            }
        };

        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        window.openHistoryModal = () => document.getElementById('historyModal').style.display = 'flex';
        window.updateDriverProfile = () => {
            const picker = document.getElementById('driverPicker');
            document.getElementById('displayDriver').innerText = picker.options[picker.selectedIndex].text;
            document.getElementById('profilePic').src = picker.value + ".jpg";
        };
    </script>
</body>
</html>
