<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetTrack</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; }
        .menu { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 280px; border: 2px solid #007AFF; transition: all 0.3s; }
        
        .driver-container { display: flex; align-items: center; gap: 12px; width: 100%; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .profile-img { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #007AFF; object-fit: cover; background: #eee; }
        .tracking-active .profile-img { border-color: #34C759; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); } }

        .history-controls { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 2px dashed #eee; }
        .history-row { display: flex; gap: 5px; width: 100%; }
        input[type="date"] { padding: 8px; border-radius: 8px; border: 1px solid #ddd; flex-grow: 1; font-family: inherit; }
        
        button { padding: 12px 20px; border-radius: 12px; border: none; background: #007AFF; color: white; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-history { background: #5856D6; padding: 8px; font-size: 14px; }
        .btn-export { background: #34C759; display: none; margin-top: 5px; }
        .viewing-history { border-color: #5856D6 !important; }

        .stats-row { display: flex; gap: 10px; align-items: center; margin: 5px 0; width: 100%; justify-content: space-around; }
        .speed-display { font-size: 28px; font-weight: bold; color: #007AFF; text-align: center; }
        .status { font-size: 12px; color: #666; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="menu" id="mainMenu">
        <select class="driver-selector" id="driverPicker" onchange="updateVehicleIcon()" style="width:100%; padding:8px; border-radius:10px; margin-bottom:5px;">
            <option value="ron" data-type="car">Ron Sarmenta (Car)</option>
            <option value="mico" data-type="moto">Mico Balmaceda (Moto)</option>
            <option value="darwin" data-type="moto">Darwin Pengson (Moto)</option>
            <option value="eljhay" data-type="moto">Eljhay Ramos (Moto)</option>
            <option value="vergel" data-type="moto">Vergel Apurillo (Moto)</option>
        </select>

        <div class="driver-container" id="driverBox">
            <img id="profilePic" src="Ron Sarmenta.jpg" class="profile-img" alt="Driver">
            <div style="display:flex; flex-direction:column; flex-grow:1;">
                <span id="displayDriver" style="font-weight:bold;">Ron Sarmenta</span>
                <span id="displayUser" style="font-size:11px; color:#007AFF;">@ronsarmenta_imerch</span>
                <span id="lastSeen" style="font-size:9px; color:#888;">iMerch Fleet Member</span>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn">📡 Start Fleet Tracking</button>

        <div class="history-controls">
            <div class="history-row">
                <input type="date" id="historyDate">
                <button onclick="loadHistory()" class="btn-history">📂 View Path</button>
            </div>
            <button onclick="exportToExcel()" id="exportBtn" class="btn-export">📊 Export to Excel</button>
            <button onclick="backToLive()" id="liveBtn" style="display:none; background:#8E8E93;">🟢 Back to Live</button>
        </div>
        
        <div class="stats-row">
            <div class="speed-display"><span id="speed">0</span><span style="font-size:10px; display:block; color:#666;">km/h</span></div>
            <div style="font-size:13px; font-weight:bold;">
                <span id="battery">🔋 --%</span><br>
                <span id="distance">🏁 0.00 km</span>
            </div>
        </div>
        <div id="status" class="status">iMerch FleetTrack Ready</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Define Icons
        const carIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const motoIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1986/1986937.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const map = L.map('map').setView([14.5794, 121.0359], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let carMarker = L.marker([14.5794, 121.0359], {icon: carIcon}).addTo(map);
        let routePath = L.polyline([], {color: '#007AFF', weight: 5}).addTo(map);

        let liveListener = null;
        let isHistoryMode = false;

        // --- VEHICLE SWITCHER ---
        window.updateVehicleIcon = () => {
            const picker = document.getElementById('driverPicker');
            const selectedOption = picker.options[picker.selectedIndex];
            const type = selectedOption.getAttribute('data-type');
            
            if (type === 'moto') {
                carMarker.setIcon(motoIcon);
            } else {
                carMarker.setIcon(carIcon);
            }
        };

        // --- EXPORT LOGIC ---
        window.exportToExcel = async () => {
            const date = document.getElementById('historyDate').value;
            const driverKey = document.getElementById('driverPicker').value;
            const driverName = document.getElementById('displayDriver').innerText;

            const historyRef = ref(db, `archives/${driverKey}/${date}`);
            const snapshot = await get(historyRef);

            if (!snapshot.exists()) return alert("No logs for export.");

            const data = snapshot.val();
            const rows = Object.keys(data).map(ts => ({
                "Date": date,
                "Driver": driverName,
                "Time": new Date(parseInt(ts)).toLocaleTimeString('en-PH'),
                "Lat": data[ts].lat,
                "Lng": data[ts].lng,
                "Org": "iMerch Media Inc."
            }));

            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Log");
            XLSX.writeFile(wb, `FleetTrack_${driverName}_${date}.xlsx`);
        };

        // --- HISTORY LOGIC ---
        window.loadHistory = async () => {
            const date = document.getElementById('historyDate').value;
            const driver = document.getElementById('driverPicker').value;
            if(!date) return alert("Select date!");

            if(liveListener) liveListener(); 
            isHistoryMode = true;
            document.getElementById('liveBtn').style.display = "block";
            document.getElementById('exportBtn').style.display = "block";
            
            const snapshot = await get(ref(db, `archives/${driver}/${date}`));
            if(snapshot.exists()) {
                const points = Object.values(snapshot.val()).map(p => [p.lat, p.lng]);
                routePath.setLatLngs(points);
                carMarker.setLatLng(points[points.length - 1]);
                map.fitBounds(routePath.getBounds());
            }
        };

        window.backToLive = () => {
            isHistoryMode = false;
            document.getElementById('liveBtn').style.display = "none";
            document.getElementById('exportBtn').style.display = "none";
            startLiveUpdates();
        };

        function startLiveUpdates() {
            if(liveListener) liveListener();
            liveListener = onValue(ref(db, 'cars/car1'), (snap) => {
                if(snap.exists() && !isHistoryMode){
                    const d = snap.val();
                    carMarker.setLatLng([d.lat, d.lng]);
                    if (d.history) routePath.setLatLngs(Object.values(d.history).map(p => [p.lat, p.lng]));
                    document.getElementById('speed').innerText = d.speed || 0;
                    document.getElementById('distance').innerText = "🏁 " + (d.dist || "0.00") + " km";
                    document.getElementById('battery').innerText = "🔋 " + (d.battery || "--") + "%";
                }
            });
        }

        startLiveUpdates();
    </script>
</body>
</html>
