<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetTrack</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        
        /* LOGO HEADER - Adjusted Transparency & Blur */
        .logo-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: rgba(255, 255, 255, 0.85); padding: 6px 18px; 
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0, 122, 255, 0.3); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        
        .header-logo-img { height: 28px; width: auto; object-fit: contain; }
        .logo-text { font-family: 'Segoe UI', sans-serif; font-weight: 800; font-size: 16px; color: #333; letter-spacing: -0.5px; }
        .logo-text span { color: #007AFF; }

        /* MENU STYLE - Mobile Optimized */
        .menu { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 15px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; 
            align-items: center; gap: 5px; width: 90%; max-width: 320px; 
            border: 1px solid #007AFF; transition: all 0.3s; 
        }
        
        @media (max-width: 480px) {
            .menu { bottom: 15px; padding: 12px; width: 92%; }
            .logo-header { top: 10px; width: 80%; justify-content: center; }
        }

        .home-logo-container { width: 100%; display: flex; justify-content: center; padding-bottom: 8px; margin-bottom: 5px; border-bottom: 1px solid #f0f0f0; }
        .home-logo-img { height: 35px; width: auto; opacity: 0.9; }

        .driver-container { display: flex; align-items: center; gap: 10px; width: 100%; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; margin-bottom: 5px; }
        .profile-img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #007AFF; object-fit: cover; }
        
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; background: #8e8e93; }
        .status-moving { background: #34C759; box-shadow: 0 0 8px #34C759; }
        .status-parked { background: #FF3B30; }
        
        .vehicle-switcher { display: flex; width: 100%; gap: 5px; margin-bottom: 5px; }
        .v-btn { flex: 1; padding: 8px; font-size: 11px; border-radius: 10px; border: 1px solid #007AFF; background: white; color: #007AFF; font-weight: bold; }
        .v-btn.active { background: #007AFF; color: white; }
        
        button#btn { padding: 12px; border-radius: 14px; background: #007AFF; color: white; font-weight: 800; width: 100%; border: none; }
        button#btn.tracking-on { background: #FF3B30; animation: pulse-red 2s infinite; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }

        .stats-row { display: flex; gap: 10px; align-items: center; margin-top: 5px; width: 100%; justify-content: space-around; background: #f8f9fa; border-radius: 12px; padding: 8px 0; }
        .speed-display { font-size: 24px; font-weight: 900; color: #007AFF; line-height: 1; }
        .status { font-size: 11px; color: #8e8e93; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="logo-header">
        <img src="i-Merch Media Logo.png" alt="iMerch Logo" class="header-logo-img">
        <div class="logo-text">Fleet<span>Track</span></div>
    </div>

    <div id="map"></div>
    
    <div class="menu" id="mainMenu">
        <div class="home-logo-container">
            <img src="i-Merch Media Logo.png" alt="iMerch Home" class="home-logo-img">
        </div>

        <select id="driverPicker" onchange="updateDriverProfile()" style="width:100%; padding:10px; border-radius:12px; border:1px solid #ddd; margin-bottom:8px; font-weight:600;">
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Apurillo</option>
        </select>

        <div class="vehicle-switcher">
            <button class="v-btn active" id="carBtn" onclick="setVehicle('car')">🚗 Car</button>
            <button class="v-btn" id="motoBtn" onclick="setVehicle('moto')">🏍️ Moto</button>
        </div>

        <div class="driver-container" style="position:relative;">
            <div class="profile-img-wrapper">
                <img id="profilePic" src="Ron Sarmenta.jpg" class="profile-img" alt="Driver">
                <div id="statusDot" class="status-dot"></div>
            </div>
            <div style="display:flex; flex-direction:column; flex-grow:1; margin-left:10px;">
                <span id="displayDriver" style="font-weight:800; font-size:14px;">Ron Sarmenta</span>
                <span id="displayUser" style="font-size:11px; color:#007AFF;">@ronsarmenta_imerch</span>
                <span id="lastSeen" style="font-size:10px; color:#FF3B30;">Signal: Waiting...</span>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn">📡 Start Tracking</button>

        <div class="stats-row">
            <div class="speed-display"><span id="speed">0</span><span style="font-size:10px; display:block; color:#666; font-weight:normal;">km/h</span></div>
            <div style="font-size:12px; font-weight:700;">
                <span id="battery">🔋 --%</span><br>
                <span id="distance">🏁 0.00 km</span>
            </div>
        </div>
        <div id="status" class="status">System Online</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [40, 40], iconAnchor: [20, 20] });
        const motoIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/1986/1986937.png', iconSize: [40, 40], iconAnchor: [20, 20] });

        const map = L.map('map', { zoomControl: false }).setView([14.5794, 121.0359], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let carMarker = L.marker([14.5794, 121.0359], {icon: carIcon}).addTo(map);
        let isTracking = false;
        let watchID = null;
        let totalDistance = 0;
        let lastLat = null; let lastLng = null;

        // REAL-TIME BATTERY UPDATE LOGIC
        async function syncBattery(driverKey) {
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                const updateBat = () => {
                    const level = Math.round(battery.level * 100);
                    if(isTracking) {
                        update(ref(db, 'cars/car1'), { battery: level });
                    }
                };
                battery.addEventListener('levelchange', updateBat);
                battery.addEventListener('chargingchange', updateBat);
                updateBat();
            }
        }

        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driverKey = document.getElementById('driverPicker').value;
            
            if (!isTracking) {
                isTracking = true;
                btn.innerText = "🛑 Stop Tracking";
                btn.classList.add('tracking-on');
                syncBattery(driverKey);
                
                watchID = navigator.geolocation.watchPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const speed = Math.round((pos.coords.speed || 0) * 3.6);
                    
                    update(ref(db, 'cars/car1'), {
                        lat: lat, lng: lng, speed: speed,
                        lastUpdated: new Date().getTime(), driver: driverKey
                    });
                    map.panTo([lat, lng]);
                }, null, { enableHighAccuracy: true });
            } else {
                isTracking = false;
                navigator.geolocation.clearWatch(watchID);
                btn.innerText = "📡 Start Tracking";
                btn.classList.remove('tracking-on');
            }
        };

        window.updateDriverProfile = () => {
            const picker = document.getElementById('driverPicker');
            const val = picker.value;
            document.getElementById('profilePic').src = val + ".jpg";
            document.getElementById('displayDriver').innerText = picker.options[picker.selectedIndex].text;
            document.getElementById('displayUser').innerText = "@" + val + "_imerch";
        };

        window.setVehicle = (type) => {
            document.getElementById('carBtn').classList.toggle('active', type === 'car');
            document.getElementById('motoBtn').classList.toggle('active', type === 'moto');
            carMarker.setIcon(type === 'moto' ? motoIcon : carIcon);
        };

        function startLiveUpdates() {
            onValue(ref(db, 'cars/car1'), (snap) => {
                if(snap.exists()){
                    const d = snap.val();
                    carMarker.setLatLng([d.lat, d.lng]);
                    document.getElementById('speed').innerText = d.speed || 0;
                    document.getElementById('battery').innerText = "🔋 " + (d.battery || "--") + "%";
                    document.getElementById('lastSeen').innerText = "Last Seen: " + new Date().toLocaleTimeString();
                    document.getElementById('statusDot').className = (d.speed > 2) ? "status-dot status-moving" : "status-dot status-parked";
                }
            });
        }
        startLiveUpdates();
    </script>
</body>
</html>
