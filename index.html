<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetLink</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    <link rel="apple-touch-icon" href="i-Merch Media Logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: rgba(255, 255, 255, 0.9); --text: #333; --border: #007AFF; --card-bg: #f8f9fa; --accent: #FF9500; }
        .dark-mode { --bg: rgba(28, 28, 30, 0.9); --text: #ffffff; --border: #0A84FF; --card-bg: #2c2c2e; }
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        
        .logo-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: var(--bg); padding: 12px 30px; 
            border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; align-items: center; border: 2px solid var(--border);
        }
        .header-logo-img { height: 45px; }
        .logo-text { font-family: sans-serif; font-weight: 800; font-size: 20px; color: var(--text); }
        .logo-text span { color: #007AFF; }

        .side-controls { position: absolute; top: 20px; right: 20px; z-index: 1002; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: var(--bg); border: 1.5px solid var(--border); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }

        .menu { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--bg); padding: 18px; border-radius: 28px; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.3); display: flex; flex-direction: column; 
            gap: 10px; width: 92%; max-width: 360px; border: 1px solid var(--border); color: var(--text);
        }

        #routeStatus { 
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: #FF9500; color: white; padding: 10px 20px; border-radius: 25px;
            font-weight: bold; z-index: 1001; display: none; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .export-btn { background: #34C759; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px;}
        .fuel-log-btn { background: var(--accent) !important; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        
        #fuelModal, #chartModal, #routeModal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; color: var(--text); overflow-y: auto; max-height: 90vh; }
        select, input { background: var(--card-bg); color: var(--text); border: 1px solid #ddd; padding: 12px; border-radius: 12px; width: 100%; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #007AFF; object-fit: cover; }
        
        .chart-container { background: var(--card-bg); border-radius: 15px; padding: 10px; margin: 10px 0; }
        .stats-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; padding-top: 5px; border-top: 1px solid #eee; margin-top: 5px; }
    </style>
</head>
<body class="light-mode">
    <div id="routeStatus">
        <span id="routeInfo">Showing History</span><br>
        <small onclick="clearRouteLayer()" style="text-decoration:underline; cursor:pointer;">Close & Clear Map</small>
    </div>

    <div class="logo-header">
        <img src="i-Merch Media Logo.png" class="header-logo-img">
        <div class="logo-text">Fleet<span>Link</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()">🌓</div>
        <div class="control-btn" onclick="openRouteModal()">🗺️</div>
    </div>

    <div id="map"></div>
    
    <div class="menu">
        <select id="driverPicker" onchange="updateDriverProfile()">
            <option value="auto">🚗 Company Auto</option>
            <option value="motor">🏍️ Company Motorcycle</option>
            <option value="ron">Ron Sarmenta</option>
            <option value="mico">Mico Balmaceda</option>
            <option value="darwin">Darwin Pengson</option>
            <option value="eljhay">Eljhay Ramos</option>
            <option value="vergel">Vergel Apurillo</option>
        </select>

        <div style="display:flex; align-items:center; gap:10px;">
            <img id="profilePic" src="auto.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6596/6596121.png'">
            <div style="flex-grow: 1;">
                <b id="displayDriver">Company Auto</b><br>
                <span id="lastSeen" style="font-size:11px;">Status: Standby</span>
                <div class="stats-row">
                    <span>Dist: <span id="statDist">0.00</span> km</span>
                    <span>🔋: <span id="statBatt">--</span>%</span>
                </div>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn" style="padding:15px; border-radius:15px; background:#007AFF; color:white; font-weight:bold; border:none; cursor:pointer;">📡 Start Tracking</button>
        
        <div class="action-grid">
            <button onclick="openFuelModal()" class="fuel-log-btn">⛽ Fuel</button>
            <button onclick="openChartModal()" class="fuel-log-btn" style="background:#5856D6 !important;">📊 Report</button>
        </div>
    </div>

    <div id="routeModal">
        <div class="modal-content">
            <h3>🗺️ Route History</h3>
            <select id="histDriver">
                <option value="auto">Company Auto</option>
                <option value="motor">Company Motorcycle</option>
                <option value="ron">Ron Sarmenta</option>
                <option value="mico">Mico Balmaceda</option>
                <option value="darwin">Darwin Pengson</option>
                <option value="eljhay">Eljhay Ramos</option>
                <option value="vergel">Vergel Apurillo</option>
            </select>
            <input type="date" id="histDate">
            <button class="export-btn" onclick="loadRouteHistory()">Load Daily Route</button>
            <button onclick="closeRouteModal()" style="background:none; border:none; color:gray;">Cancel</button>
        </div>
    </div>

    <div id="chartModal">
        <div class="modal-content">
            <h3 style="margin:0;">📊 Fleet Dashboard</h3>
            <div class="chart-container">
                <canvas id="fuelChart"></canvas>
            </div>
            <button class="export-btn" onclick="exportDataToExcel()">📂 Export All Logs (Excel)</button>
            <button class="export-btn" style="background:#FF3B30;" onclick="adminClearLogs()">🗑️ Clear All Logs (Admin)</button>
            <button class="export-btn" style="background:#8E8E93;" onclick="closeChartModal()">Close</button>
        </div>
    </div>

    <div id="fuelModal">
        <div class="modal-content">
            <h3>⛽ Fuel Entry</h3>
            <input type="number" id="fuelAmount" placeholder="Amount (PHP)">
            <input type="number" id="fuelLiters" placeholder="Liters (L)">
            <button class="export-btn" onclick="submitFuel()">Save Log</button>
            <button onclick="closeFuelModal()">Cancel</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, push, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map', { zoomControl: false }).setView([14.5794, 121.0359], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let historyLayer = null;
        let fuelChartInstance = null;
        let wakeLock = null;
        document.getElementById('histDate').value = new Date().toISOString().split('T')[0];

        // --- DISTANCE CALC ---
        function calculateDistance(coords) {
            let total = 0;
            for (let i = 0; i < coords.length - 1; i++) {
                const p1 = coords[i], p2 = coords[i+1];
                const R = 6371; 
                const dLat = (p2[0]-p1[0]) * Math.PI / 180, dLon = (p2[1]-p1[1]) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(p1[0]*Math.PI/180) * Math.cos(p2[0]*Math.PI/180) * Math.sin(dLon/2)**2;
                total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
            return total.toFixed(2);
        }

        // --- TRACKING ---
        let isTracking = false;
        let watchID = null;

        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            const driver = document.getElementById('driverPicker').value;
            const today = new Date().toISOString().split('T')[0];

            if (!isTracking) {
                isTracking = true;
                btn.innerText = "🛑 Stop Tracking";
                btn.style.background = "#FF3B30";
                alert(`Tracking started for ${driver.toUpperCase()}. Keep GPS on.`);

                watchID = navigator.geolocation.watchPosition(async pos => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    let currentBatt = 0;
                    try { const b = await navigator.getBattery(); currentBatt = Math.round(b.level * 100); } catch(e){}
                    
                    update(ref(db, `cars/${driver}`), { lat, lng, batt: currentBatt, lastUpdated: Date.now() });
                    push(ref(db, `history/${driver}/${today}`), { lat, lng, time: Date.now(), batt: currentBatt });
                }, null, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });

                if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
            } else {
                isTracking = false;
                navigator.geolocation.clearWatch(watchID);
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
                btn.innerText = "📡 Start Tracking";
                btn.style.background = "#007AFF";
            }
        };

        // --- PROFILE & LIVE STATS ---
        window.updateDriverProfile = () => {
            const p = document.getElementById('driverPicker');
            const driver = p.value;
            const img = document.getElementById('profilePic');
            img.src = driver + ".jpg";
            document.getElementById('displayDriver').innerText = p.options[p.selectedIndex].text;
            
            const today = new Date().toISOString().split('T')[0];
            onValue(ref(db, `history/${driver}/${today}`), (snapshot) => {
                if(snapshot.exists()){
                    const points = Object.values(snapshot.val()).sort((a,b) => a.time - b.time);
                    const coords = points.map(p => [p.lat, p.lng]);
                    document.getElementById('statDist').innerText = calculateDistance(coords);
                    document.getElementById('statBatt').innerText = points[points.length-1].batt || "--";
                } else {
                    document.getElementById('statDist').innerText = "0.00";
                    document.getElementById('statBatt').innerText = "--";
                }
            });
        };

        // --- HISTORY ---
        window.loadRouteHistory = async () => {
            const driver = document.getElementById('histDriver').value;
            const date = document.getElementById('histDate').value;
            const snapshot = await get(ref(db, `history/${driver}/${date}`));
            if(!snapshot.exists()) return alert("No history for this date.");
            
            const points = Object.values(snapshot.val()).sort((a,b) => a.time - b.time);
            const coords = points.map(p => [p.lat, p.lng]);
            
            if(historyLayer) map.removeLayer(historyLayer);
            historyLayer = L.polyline(coords, { color: '#FF9500', weight: 5, opacity: 0.8 }).addTo(map);
            map.fitBounds(historyLayer.getBounds());
            
            document.getElementById('routeStatus').style.display = 'block';
            closeRouteModal();
        };

        // UI Helpers
        window.openRouteModal = () => document.getElementById('routeModal').style.display = 'flex';
        window.closeRouteModal = () => document.getElementById('routeModal').style.display = 'none';
        window.openFuelModal = () => document.getElementById('fuelModal').style.display = 'flex';
        window.closeFuelModal = () => document.getElementById('fuelModal').style.display = 'none';
        window.openChartModal = () => { document.getElementById('chartModal').style.display = 'flex'; window.loadDashboard(); };
        window.closeChartModal = () => document.getElementById('chartModal').style.display = 'none';
        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.clearRouteLayer = () => { if(historyLayer) map.removeLayer(historyLayer); document.getElementById('routeStatus').style.display = 'none'; };

        // Database Admin
        window.adminClearLogs = async () => {
            if (prompt("Admin Password:") === "admin123") {
                await remove(ref(db, 'fuelLogs'));
                await remove(ref(db, 'history'));
                location.reload();
            }
        };

        window.updateDriverProfile(); // Init
    </script>
</body>
</html>
