<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch FleetLink</title>
    
    <link rel="icon" type="image/png" href="i-Merch Media Logo.png">
    <link rel="apple-touch-icon" href="i-Merch Media Logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: rgba(255, 255, 255, 0.95); --text: #333; --border: #007AFF; --card-bg: #ffffff; --accent: #FF9500; --secondary-text: #8e8e93; --danger: #FF3B30; }
        .dark-mode { --bg: rgba(28, 28, 30, 0.95); --text: #ffffff; --border: #0A84FF; --card-bg: #1c1c1e; }
        
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        .logo-header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; background: var(--bg); padding: 10px 25px; 
            border-radius: 60px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; align-items: center; border: 1.5px solid var(--border);
        }
        .header-logo-img { height: 35px; }
        .logo-text { font-weight: 800; font-size: 18px; color: var(--text); }
        .logo-text span { color: #007AFF; }

        .menu { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: var(--bg); padding: 20px; border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; 
            width: 92%; max-width: 380px; border: 1px solid rgba(0,122,255,0.2); color: var(--text);
        }

        .vehicle-toggle {
            display: grid; grid-template-columns: 1fr 1fr; background: #eee;
            border-radius: 12px; padding: 4px; margin-bottom: 12px;
        }
        .v-btn { padding: 8px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: transparent; transition: 0.3s; }
        .v-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: #007AFF; }

        .stats-container {
            background: var(--card-bg); border-radius: 20px; padding: 15px; margin: 10px 0;
            border: 1px solid #e5e5ea; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .speed-display { text-align: center; flex: 1; border-right: 1px solid #eee; }
        .speed-val { font-size: 28px; font-weight: 800; color: #007AFF; display: block; }
        
        .side-controls { position: absolute; top: 20px; right: 20px; z-index: 1002; display: flex; flex-direction: column; gap: 10px; }
        .control-btn { background: var(--bg); border: 1.5px solid var(--border); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .main-btn { padding: 16px; border-radius: 18px; background: #007AFF; color: white; font-weight: bold; border: none; cursor: pointer; font-size: 16px; width: 100%; }
        .profile-section { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #007AFF; object-fit: cover; background: #eee; }
        
        .modal-content { background: var(--bg); padding: 20px; border-radius: 20px; width: 85%; max-width: 400px; color: var(--text); position: relative; }
        #chartModal, #fuelModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 5px 0; }
    </style>
</head>
<body class="light-mode">
    <div class="logo-header">
        <img src="i-Merch Media Logo.png" class="header-logo-img">
        <div class="logo-text">Fleet<span>Link</span></div>
    </div>

    <div class="side-controls">
        <div class="control-btn" onclick="toggleTheme()">🌓</div>
        <div class="control-btn" onclick="toggleMapStyle()">🛰️</div>
    </div>

    <div id="map"></div>
    
    <div class="menu" id="mainMenu">
        <div class="profile-section">
            <img id="profilePic" src="Ron Sarmenta.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
            <div>
                <b id="displayDriver" style="font-size: 18px;">Ron Sarmenta</b><br>
                <span style="font-size: 11px; color: var(--secondary-text);">Unit: <span id="currentVehicle">Car</span></span><br>
                <span style="font-size: 11px; color: var(--accent);">Seen: <span id="lastSeenStatus">--:--</span></span>
            </div>
        </div>

        <select id="driverPicker" onchange="updateDriverProfile()" style="margin-bottom: 10px;">
            <option value="Ron Sarmenta">Ron Sarmenta</option>
            <option value="Mico">Mico Balmaceda</option>
            <option value="Darwin">Darwin Pengson</option>
            <option value="Vergel">Vergel Archer</option>
            <option value="Eljhay">Eljhay Ramos</option>
        </select>

        <div class="vehicle-toggle">
            <button id="vCar" class="v-btn active" onclick="setVehicle('Car')">🚗 Car</button>
            <button id="vMoto" class="v-btn" onclick="setVehicle('Motorcycle')">🏍️ Moto</button>
        </div>

        <div class="stats-container">
            <div class="speed-display">
                <span id="liveSpeed" class="speed-val">0</span>
                <span style="font-size: 12px; font-weight: bold; color: #007AFF;">km/h</span>
            </div>
            <div style="flex: 1.5; padding-left: 15px; font-size: 13px; font-weight: 600;">
                <div>🔋 <span id="statBatt">--</span>%</div>
                <div>🏁 <span id="statDist">0.00</span> km</div>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn" class="main-btn">📡 Start Tracking</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button onclick="openFuelModal()" class="main-btn" style="background:var(--accent); padding:10px; font-size:12px;">⛽ Fuel Log</button>
            <button onclick="checkAdminPass()" class="main-btn" style="background:#5856D6; padding:10px; font-size:12px;">📊 Report</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map', { zoomControl: false }).setView([14.5794, 121.0359], 15);
        const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

        let myUID = localStorage.getItem('fleetlink_uid') || 'unit-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('fleetlink_uid', myUID);
        
        let marker = null;
        window.currentVehicleType = "Car";

        const carIcon = L.divIcon({ html: '🚗', className: 'map-icon', iconSize: [30, 30] });
        const motoIcon = L.divIcon({ html: '🏍️', className: 'map-icon', iconSize: [30, 30] });

        window.setVehicle = (type) => {
            window.currentVehicleType = type;
            document.getElementById('currentVehicle').innerText = type;
            document.getElementById('vCar').classList.toggle('active', type === 'Car');
            document.getElementById('vMoto').classList.toggle('active', type === 'Motorcycle');
            if(marker) marker.setIcon(type === 'Car' ? carIcon : motoIcon);
        };

        window.updateDriverProfile = () => {
            const name = document.getElementById('driverPicker').value;
            document.getElementById('displayDriver').innerText = name;
            // RESTORED JPG MAPPING
            const imgMap = {
                "Ron Sarmenta": "Ron Sarmenta.jpg",
                "Mico": "mico.jpg",
                "Darwin": "darwin.jpg",
                "Vergel": "vergel.jpg",
                "Eljhay": "eljhay.jpg"
            };
            document.getElementById('profilePic').src = imgMap[name] || "Ron Sarmenta.jpg";
        };

        window.toggleTracking = () => {
            const btn = document.getElementById('btn');
            if (!window.isTracking) {
                window.isTracking = true;
                btn.innerText = "🛑 Stop Tracking"; btn.style.background = "#FF3B30";
                window.watchID = navigator.geolocation.watchPosition(pos => {
                    const { latitude: lat, longitude: lng, speed: rawSpeed } = pos.coords;
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    // UPDATE TIME STATUS
                    document.getElementById('lastSeenStatus').innerText = time;
                    document.getElementById('liveSpeed').innerText = Math.round((rawSpeed || 0) * 3.6);

                    if(!marker) {
                        marker = L.marker([lat, lng], { icon: window.currentVehicleType === 'Car' ? carIcon : motoIcon }).addTo(map);
                    } else {
                        marker.setLatLng([lat, lng]);
                    }
                    map.panTo([lat, lng]);

                    update(ref(db, `cars/${myUID}`), { 
                        lat, lng, 
                        vehicle: window.currentVehicleType,
                        lastSeen: time 
                    });
                }, null, { enableHighAccuracy: true });
            } else {
                window.isTracking = false;
                navigator.geolocation.clearWatch(window.watchID);
                btn.innerText = "📡 Start Tracking"; btn.style.background = "#007AFF";
            }
        };

        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.toggleMapStyle = () => {
            if (map.hasLayer(streetMap)) { map.removeLayer(streetMap); satelliteMap.addTo(map); }
            else { map.removeLayer(satelliteMap); streetMap.addTo(map); }
        };
    </script>
</body>
</html>
