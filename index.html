<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarTracker PH Live + Premium ID</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CarTracker PH">
    <link rel="apple-touch-icon" href="icon.jpg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { height: 100%; width: 100%; margin: 0; padding: 0; background: #f0f0f0; }
        .menu { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 280px; border: 2px solid #007AFF; transition: all 0.3s; }
        
        /* Premium Driver Info Styles */
        .driver-container { display: flex; align-items: center; gap: 12px; width: 100%; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 5px; position: relative; }
        .profile-img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #007AFF; object-fit: cover; background: #eee; }
        .driver-text { display: flex; flex-direction: column; align-items: flex-start; flex-grow: 1; }
        .driver-name { font-size: 16px; font-weight: bold; color: #222; }
        .driver-user { font-size: 11px; color: #007AFF; font-weight: 600; text-transform: lowercase; }
        
        /* New Last Seen Badge */
        .last-seen { font-size: 9px; color: #888; margin-top: 2px; font-style: italic; }

        button { padding: 12px 20px; border-radius: 12px; border: none; background: #007AFF; color: white; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 5px; }
        .stats-row { display: flex; gap: 10px; align-items: center; margin: 5px 0; width: 100%; justify-content: space-around; }
        .speed-display { font-size: 28px; font-weight: bold; color: #007AFF; text-align: center; line-height: 1; }
        .speed-label { font-size: 10px; text-transform: uppercase; display: block; color: #666; }
        .sub-stats { font-size: 13px; font-weight: bold; color: #444; display: flex; flex-direction: column; gap: 2px; }
        .status { font-size: 12px; color: #666; text-align: center; font-weight: 500; border-top: 1px solid #eee; padding-top: 5px; width: 100%; }
        
        .outside-fence { border: 3px solid #FF3B30 !important; background: #ffebeb !important; }
        .outside-text, .low-battery { color: #FF3B30 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="menu" id="mainMenu">
        <div class="driver-container">
            <img src="icon.jpg" class="profile-img" alt="Driver" onerror="this.src='https://ui-avatars.com/api/?name=Ron+Sanity&background=007AFF&color=fff'">
            <div class="driver-text">
                <span class="driver-name" id="displayDriver">Ron Sanity</span>
                <span class="driver-user" id="displayUser">@ronsarmenta_imerch</span>
                <span class="last-seen" id="lastSeen">Last Seen: Just now</span>
            </div>
        </div>

        <button onclick="toggleTracking()" id="btn">📡 Start PH Tracking</button>
        
        <div class="stats-row">
            <div class="speed-display">
                <span id="speed">0</span>
                <span class="speed-label">km/h</span>
            </div>
            <div class="sub-stats">
                <span id="battery">🔋 --%</span>
                <span id="distance">🏁 0.00 km</span>
                <span id="maxSpeed" style="color: #FF9500;">🚀 Max: 0 km/h</span>
            </div>
        </div>
        <div id="status" class="status">Waiting for GPS...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://cartracker-1df45-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const fenceCenter = [14.5794, 121.0359]; 
        const fenceRadius = 1000; 

        const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
        const trafficLayer = L.tileLayer('https://mt1.google.com/vt?lyrs=h@159,traffic&x={x}&y={y}&z={z}', { attribution: '© Google Traffic' });

        const map = L.map('map', { center: fenceCenter, zoom: 14, layers: [streetMap, trafficLayer] });
        L.control.layers({ "Street": streetMap }, { "🚦 Traffic": trafficLayer }).addTo(map);
        
        const geofence = L.circle(fenceCenter, { color: '#007AFF', fillColor: '#007AFF', fillOpacity: 0.1, radius: fenceRadius }).addTo(map);
        let carMarker = L.marker(fenceCenter).addTo(map);
        let routePath = L.polyline([], {color: '#007AFF', weight: 5, opacity: 0.6}).addTo(map);

        let totalDistance = 0;
        let lastLatLng = null;
        let currentMaxSpeed = 0;

        onValue(ref(db, 'cars/car1'), (snap) => {
            if(snap.exists()){
                const data = snap.val();
                const carPos = L.latLng(data.lat, data.lng);
                carMarker.setLatLng(carPos);
                map.setView(carPos);

                if (data.history) {
                    const pathArray = Object.values(data.history).map(pt => [pt.lat, pt.lng]);
                    routePath.setLatLngs(pathArray);
                }

                if(data.driverName) document.getElementById('displayDriver').innerText = data.driverName;
                if(data.username) document.getElementById('displayUser').innerText = "@" + data.username;
                
                // Update Last Seen Timestamp
                if(data.lastUpdate) {
                    const updateDate = new Date(data.lastUpdate);
                    document.getElementById('lastSeen').innerText = "Last Seen: " + updateDate.toLocaleTimeString('en-PH');
                }

                document.getElementById('speed').innerText = data.speed || 0;
                document.getElementById('distance').innerText = "🏁 " + (data.dist || "0.00") + " km";
                document.getElementById('maxSpeed').innerText = "🚀 Max: " + (data.maxSpeed || 0) + " km/h";
                
                const batLabel = document.getElementById('battery');
                batLabel.innerText = (data.battery <= 20 ? "🪫 " : "🔋 ") + (data.battery || "--") + "%";
                batLabel.className = data.battery <= 20 ? "low-battery" : "";
                
                const distToCenter = map.distance(carPos, L.latLng(fenceCenter));
                const statusLabel = document.getElementById('status');
                const mainMenu = document.getElementById('mainMenu');

                if (distToCenter > fenceRadius) {
                    statusLabel.innerText = "🚨 OUTSIDE GEOFENCE!";
                    statusLabel.className = "status outside-text";
                    mainMenu.className = "menu outside-fence";
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else {
                    statusLabel.innerText = "Live Tracker Active";
                    statusLabel.className = "status";
                    mainMenu.className = "menu";
                }
            }
        });

        let watchID = null;
        window.toggleTracking = async () => {
            const btn = document.getElementById('btn');
            if(watchID) {
                navigator.geolocation.clearWatch(watchID);
                watchID = null;
                lastLatLng = null;
                btn.innerText = "📡 Start PH Tracking";
                btn.style.background = "#007AFF";
            } else {
                totalDistance = 0;
                currentMaxSpeed = 0;
                routePath.setLatLngs([]);
                btn.innerText = "🛑 Stop Tracking";
                btn.style.background = "#FF3B30";

                set(ref(db, 'cars/car1/history'), null);

                watchID = navigator.geolocation.watchPosition(async pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const speedKMH = Math.round((pos.coords.speed || 0) * 3.6);
                    
                    if (speedKMH > currentMaxSpeed) currentMaxSpeed = speedKMH;

                    if (lastLatLng) {
                        const d = map.distance(lastLatLng, L.latLng(lat, lng));
                        if (d > 5) {
                            totalDistance += d;
                            set(ref(db, `cars/car1/history/${Date.now()}`), {lat, lng});
                        }
                    }
                    lastLatLng = L.latLng(lat, lng);

                    let batteryLevel = 0;
                    if (navigator.getBattery) {
                        const bat = await navigator.getBattery();
                        batteryLevel = Math.round(bat.level * 100);
                    }

                    const distKM = (totalDistance / 1000).toFixed(2);
                    
                    const updates = {};
                    updates['cars/car1/lat'] = lat;
                    updates['cars/car1/lng'] = lng;
                    updates['cars/car1/speed'] = speedKMH;
                    updates['cars/car1/maxSpeed'] = currentMaxSpeed;
                    updates['cars/car1/battery'] = batteryLevel;
                    updates['cars/car1/dist'] = distKM;
                    updates['cars/car1/driverName'] = document.getElementById('displayDriver').innerText;
                    updates['cars/car1/username'] = document.getElementById('displayUser').innerText.replace('@','');
                    updates['cars/car1/lastUpdate'] = new Date().toISOString();
                    
                    update(ref(db), updates);

                }, err => alert("GPS Error"), { enableHighAccuracy: true });
            }
        };
    </script>
</body>
</html>
